name: Claude Tag Release

on:
  workflow_call:
    inputs:
      branch_ref:
        description: 'Branch or commit ref to create tag from'
        required: true
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        description: 'API key for Claude changelog generation'
        required: true
    outputs:
      tag_name:
        description: 'The created tag name (e.g., v1.2.3)'
        value: ${{ jobs.tag.outputs.tag_name }}
      version:
        description: 'The version number (e.g., 1.2.3)'
        value: ${{ jobs.tag.outputs.version }}
      release_url:
        description: 'The GitHub release URL'
        value: ${{ jobs.tag.outputs.release_url }}

jobs:
  tag:
    runs-on: ubuntu-latest # Use GitHub-hosted runners for memory-intensive git/Claude operations
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.set-outputs.outputs.tag_name }}
      version: ${{ steps.set-outputs.outputs.version }}
      release_url: ${{ steps.set-outputs.outputs.release_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}
          ref: ${{ inputs.branch_ref }}
          # ACTIONS_TOKEN required to push tags to protected repo
          token: ${{ secrets.ACTIONS_TOKEN || github.token }}
          fetch-depth: 0

      - name: Get Version from package.json
        id: get-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Found version: $VERSION"

      - name: Check If Tag Exists
        id: check-tag
        run: |
          if [ $(git tag -l "v${{ steps.get-version.outputs.version }}") ]; then
            echo "tag_exists=true" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.get-version.outputs.version }} already exists"
          else
            echo "tag_exists=false" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.get-version.outputs.version }} does not exist yet"
          fi

      - name: Analyze changes since last release
        if: steps.check-tag.outputs.tag_exists == 'false'
        id: analyze-changes
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"

          # Get the last release tag
          LAST_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -1)

          if [ -z "$LAST_TAG" ]; then
            echo "No previous release found, analyzing all commits"
            LAST_TAG="initial"
            # For initial release, use different commands that don't require a range
            FILES_CHANGED=$(git ls-files | wc -l)
            COMMITS_COUNT=$(git rev-list --count HEAD)
            # Get stats by diffing empty tree against HEAD
            EMPTY_TREE=$(git hash-object -t tree /dev/null)
            ADDITIONS=$(git diff --shortstat "$EMPTY_TREE" HEAD | grep -oE '[0-9]+ insertions?' | grep -oE '[0-9]+' || echo "0")
            DELETIONS=$(git diff --shortstat "$EMPTY_TREE" HEAD | grep -oE '[0-9]+ deletions?' | grep -oE '[0-9]+' || echo "0")
            COMMIT_MESSAGES=$(git log --oneline --no-color HEAD | head -30)
            DETAILED_CHANGES=$(git diff --name-status --no-color "$EMPTY_TREE" HEAD | head -50)
            COMPONENTS_CHANGED=$(git ls-files | grep -E '\.(tsx?|jsx?)$' | grep -v 'test\|spec' | wc -l || echo "0")
            PAGES_CHANGED=$(git ls-files | grep -E 'pages/|app/' | wc -l || echo "0")
            STYLES_CHANGED=$(git ls-files | grep -E '\.(css|scss|sass|less)$' | wc -l || echo "0")
            PR_REFS=$(git log --oneline --no-color HEAD | grep -oE '#[0-9]+' | sort -u | head -10 || echo "")
          else
            echo "Analyzing changes since last release: $LAST_TAG"
            # Use explicit two-commit diff syntax instead of range syntax
            FILES_CHANGED=$(git diff --name-only "$LAST_TAG" HEAD | wc -l)
            COMMITS_COUNT=$(git rev-list --count "$LAST_TAG"..HEAD)
            ADDITIONS=$(git diff --shortstat "$LAST_TAG" HEAD | grep -oE '[0-9]+ insertions?' | grep -oE '[0-9]+' || echo "0")
            DELETIONS=$(git diff --shortstat "$LAST_TAG" HEAD | grep -oE '[0-9]+ deletions?' | grep -oE '[0-9]+' || echo "0")
            COMMIT_MESSAGES=$(git log --oneline --no-color "$LAST_TAG"..HEAD | head -30)
            DETAILED_CHANGES=$(git diff --name-status --no-color "$LAST_TAG" HEAD | head -50)
            COMPONENTS_CHANGED=$(git diff --name-only "$LAST_TAG" HEAD | grep -E '\.(tsx?|jsx?)$' | grep -v 'test\|spec' | wc -l || echo "0")
            PAGES_CHANGED=$(git diff --name-only "$LAST_TAG" HEAD | grep -E 'pages/|app/' | wc -l || echo "0")
            STYLES_CHANGED=$(git diff --name-only "$LAST_TAG" HEAD | grep -E '\.(css|scss|sass|less)$' | wc -l || echo "0")
            PR_REFS=$(git log --oneline --no-color "$LAST_TAG"..HEAD | grep -oE '#[0-9]+' | sort -u | head -10 || echo "")
          fi

          # Save outputs
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT
          echo "files_changed=$FILES_CHANGED" >> $GITHUB_OUTPUT
          echo "commits_count=$COMMITS_COUNT" >> $GITHUB_OUTPUT
          echo "additions=$ADDITIONS" >> $GITHUB_OUTPUT
          echo "deletions=$DELETIONS" >> $GITHUB_OUTPUT
          echo "components_changed=$COMPONENTS_CHANGED" >> $GITHUB_OUTPUT
          echo "pages_changed=$PAGES_CHANGED" >> $GITHUB_OUTPUT
          echo "styles_changed=$STYLES_CHANGED" >> $GITHUB_OUTPUT

          # Save multiline outputs using unique delimiters to avoid conflicts with content
          DELIMITER_1="GHOUTPUT_$(date +%s)_COMMIT"
          DELIMITER_2="GHOUTPUT_$(date +%s)_CHANGES"
          DELIMITER_3="GHOUTPUT_$(date +%s)_PRREFS"

          {
            echo "commit_messages<<$DELIMITER_1"
            echo "$COMMIT_MESSAGES"
            echo "$DELIMITER_1"
          } >> $GITHUB_OUTPUT

          {
            echo "detailed_changes<<$DELIMITER_2"
            echo "$DETAILED_CHANGES"
            echo "$DELIMITER_2"
          } >> $GITHUB_OUTPUT

          {
            echo "pr_refs<<$DELIMITER_3"
            echo "$PR_REFS"
            echo "$DELIMITER_3"
          } >> $GITHUB_OUTPUT

      - name: Generate changelog with Claude
        if: steps.check-tag.outputs.tag_exists == 'false'
        id: generate-changelog
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          LAST_TAG="${{ steps.analyze-changes.outputs.last_tag }}"

          # Create analysis prompt for Claude
          cat > /tmp/changelog_prompt.txt << PROMPT_EOF
          I need you to generate a concise but informative changelog for a Next.js frontend application release.

          **Release Info:**
          - App: RoboLedger (Financial reporting & accounting web application)
          - Version: $VERSION
          - Previous Version: $LAST_TAG
          - Files Changed: ${{ steps.analyze-changes.outputs.files_changed }}
          - Commits: ${{ steps.analyze-changes.outputs.commits_count }}
          - Lines Added: ${{ steps.analyze-changes.outputs.additions }}
          - Lines Deleted: ${{ steps.analyze-changes.outputs.deletions }}
          - Components Changed: ${{ steps.analyze-changes.outputs.components_changed }}
          - Pages Changed: ${{ steps.analyze-changes.outputs.pages_changed }}
          - Styles Changed: ${{ steps.analyze-changes.outputs.styles_changed }}

          **Recent Commits:**
          ${{ steps.analyze-changes.outputs.commit_messages }}

          **File Changes:**
          ${{ steps.analyze-changes.outputs.detailed_changes }}

          **PR References:**
          ${{ steps.analyze-changes.outputs.pr_refs }}

          Please generate a changelog for this Next.js frontend application that includes:
          1. A brief 1-2 sentence summary focusing on user-facing improvements
          2. Key features/improvements (bullet points) - focus on UI/UX changes
          3. Breaking changes (if any) - clearly marked with ⚠️
          4. Notable technical changes (performance, dependencies, build improvements)
          5. Bug fixes affecting user experience

          Keep it user-focused since this is a frontend application. Highlight:
          - Platform integration improvements
          - Navigation and user experience enhancements
          - Performance optimizations
          - Dashboard and analytics improvements
          - Mobile/responsive design changes
          - API integration improvements

          Use markdown formatting. Don't include a version header as that will be added separately.
          Format your response as clean markdown without any prefix text.
          PROMPT_EOF

          echo "✅ Changelog prompt created"

      - name: Call Claude API for changelog
        if: steps.check-tag.outputs.tag_exists == 'false'
        id: claude-changelog
        run: |
          # Call Claude API with the analysis prompt
          PROMPT=$(cat /tmp/changelog_prompt.txt)

          # Create a proper JSON payload using jq to handle escaping
          PAYLOAD=$(jq -n \
            --arg model "${{ vars.CLAUDE_MODEL || 'claude-sonnet-4-6' }}" \
            --arg content "$PROMPT" \
            '{
              "model": $model,
              "max_tokens": 3000,
              "messages": [
                {
                  "role": "user",
                  "content": $content
                }
              ]
            }')

          RESPONSE=$(curl -s --max-time 60 --retry 3 --retry-delay 10 -X POST "https://api.anthropic.com/v1/messages" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${{ secrets.ANTHROPIC_API_KEY }}" \
            -H "anthropic-version: 2023-06-01" \
            -d "$PAYLOAD")

          # Check for API errors
          if echo "$RESPONSE" | jq -e '.error' > /dev/null; then
            ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error.message // "Unknown error"')
            ERROR_TYPE=$(echo "$RESPONSE" | jq -r '.error.type // "unknown"')
            echo "❌ Claude API error [$ERROR_TYPE]: $ERROR_MSG"
            echo "Full response: $RESPONSE" >&2  # Log to stderr for debugging
            echo "Using fallback changelog"
            CHANGELOG="## What's Changed\n\n- ${{ steps.analyze-changes.outputs.commits_count }} commits with ${{ steps.analyze-changes.outputs.files_changed }} files changed\n- ${{ steps.analyze-changes.outputs.components_changed }} components and ${{ steps.analyze-changes.outputs.pages_changed }} pages updated\n- ${{ steps.analyze-changes.outputs.additions }} additions and ${{ steps.analyze-changes.outputs.deletions }} deletions\n\nSee commit history for detailed changes."
          else
            # Extract changelog from Claude's response
            CHANGELOG=$(echo "$RESPONSE" | jq -r '.content[0].text')

            # Validate that Claude returned meaningful content
            if [ -z "$CHANGELOG" ] || [ "$CHANGELOG" = "null" ]; then
              echo "❌ Claude returned empty changelog, using fallback"
              CHANGELOG="## What's Changed\n\n- ${{ steps.analyze-changes.outputs.commits_count }} commits with ${{ steps.analyze-changes.outputs.files_changed }} files changed\n- ${{ steps.analyze-changes.outputs.components_changed }} components and ${{ steps.analyze-changes.outputs.pages_changed }} pages updated\n- ${{ steps.analyze-changes.outputs.additions }} additions and ${{ steps.analyze-changes.outputs.deletions }} deletions\n\nSee commit history for detailed changes."
            else
              echo "✅ Claude changelog generated successfully"
            fi
          fi

          # Save changelog to output
          {
            echo "changelog<<EOF"
            echo -e "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Release Tag
        if: steps.check-tag.outputs.tag_exists == 'false'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.get-version.outputs.version }}" -m "Release v${{ steps.get-version.outputs.version }}"
          git push origin "v${{ steps.get-version.outputs.version }}"

      - name: Create GitHub Release
        if: steps.check-tag.outputs.tag_exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.get-version.outputs.version }}
          name: Release v${{ steps.get-version.outputs.version }}
          body: |
            # RoboLedger App v${{ steps.get-version.outputs.version }}

            ${{ steps.claude-changelog.outputs.changelog }}

            ---

            ## 📊 Release Statistics

            - **Commits:** ${{ steps.analyze-changes.outputs.commits_count }}
            - **Files Changed:** ${{ steps.analyze-changes.outputs.files_changed }}
            - **Components Updated:** ${{ steps.analyze-changes.outputs.components_changed }}
            - **Pages Updated:** ${{ steps.analyze-changes.outputs.pages_changed }}
            - **Styles Updated:** ${{ steps.analyze-changes.outputs.styles_changed }}
            - **Lines Added:** ${{ steps.analyze-changes.outputs.additions }}
            - **Lines Deleted:** ${{ steps.analyze-changes.outputs.deletions }}
            - **Previous Release:** ${{ steps.analyze-changes.outputs.last_tag }}

            ## 🔗 Links

            - **Live App:** [roboledger.ai](https://roboledger.ai)
            - **Full Changelog:** [${{ steps.analyze-changes.outputs.last_tag }}...v${{ steps.get-version.outputs.version }}](https://github.com/${{ github.repository }}/compare/${{ steps.analyze-changes.outputs.last_tag }}...v${{ steps.get-version.outputs.version }})
            - **All Releases:** [View all releases](https://github.com/${{ github.repository }}/releases)

            ---
            🤖 Generated with [Claude Code](https://claude.ai/code)
          draft: false
          prerelease: false
        env:
          # ACTIONS_TOKEN preferred for release creation
          GITHUB_TOKEN: ${{ secrets.ACTIONS_TOKEN || github.token }}

      - name: Create release summary
        if: steps.check-tag.outputs.tag_exists == 'false'
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"

          echo "## 🚀 RoboLedger v$VERSION Released" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release URL:** [v$VERSION](https://github.com/${{ github.repository }}/releases/tag/v$VERSION)" >> $GITHUB_STEP_SUMMARY
          echo "**Live App:** [roboledger.ai](https://roboledger.ai)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Frontend Statistics" >> $GITHUB_STEP_SUMMARY
          echo "- **Commits:** ${{ steps.analyze-changes.outputs.commits_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Files Changed:** ${{ steps.analyze-changes.outputs.files_changed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Components Updated:** ${{ steps.analyze-changes.outputs.components_changed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Pages Updated:** ${{ steps.analyze-changes.outputs.pages_changed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Styles Updated:** ${{ steps.analyze-changes.outputs.styles_changed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Previous Release:** ${{ steps.analyze-changes.outputs.last_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🤖 Claude-Generated Changelog" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.claude-changelog.outputs.changelog }}" >> $GITHUB_STEP_SUMMARY

      - name: Set outputs
        id: set-outputs
        if: steps.check-tag.outputs.tag_exists == 'false'
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          TAG_NAME="v$VERSION"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/$TAG_NAME"

          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "release_url=$RELEASE_URL" >> $GITHUB_OUTPUT

          echo "✅ Outputs set: tag=$TAG_NAME, version=$VERSION"
